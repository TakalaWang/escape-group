<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>開團</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC", sans-serif;
        background: #f5f6f8;
        color: #1a1a1a;
        min-height: 100vh;
        min-height: 100dvh;
        padding-bottom: env(safe-area-inset-bottom, 0);
        overscroll-behavior: contain;
      }
      .header {
        background: linear-gradient(135deg, #06c755 0%, #05a647 100%);
        padding: 24px 20px 20px;
        text-align: center;
        color: white;
      }
      .header h1 {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .header p {
        font-size: 13px;
        opacity: 0.85;
        margin-top: 4px;
      }

      .form-wrapper {
        padding: 16px;
      }

      .section {
        background: white;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .section-title {
        font-size: 12px;
        font-weight: 600;
        color: #06c755;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #f0f0f0;
      }

      .form-group {
        margin-bottom: 16px;
      }
      .form-group:last-child {
        margin-bottom: 0;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
        color: #333;
      }
      label .required-mark {
        color: #e53e3e;
        margin-left: 2px;
      }
      label .optional {
        font-size: 11px;
        font-weight: 400;
        color: #aaa;
        margin-left: 4px;
      }

      input,
      select {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        font-size: 16px;
        color: #1a1a1a;
        background: #fafafa;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          background 0.2s;
        -webkit-appearance: none;
        appearance: none;
      }
      input::placeholder {
        color: #c0c0c0;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #06c755;
        background: white;
        box-shadow: 0 0 0 3px rgba(6, 199, 85, 0.1);
      }
      select {
        background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23999' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 14px center;
        padding-right: 36px;
      }

      .hint {
        font-size: 12px;
        color: #999;
        margin-top: 5px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .row-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }

      .input-with-unit {
        position: relative;
      }
      .input-with-unit input {
        padding-right: 40px;
      }
      .input-with-unit .unit {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        color: #999;
        pointer-events: none;
      }

      .submit-area {
        padding: 0 16px 24px;
      }
      button[type="submit"] {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #06c755 0%, #05a647 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.1s;
        letter-spacing: 0.5px;
      }
      button[type="submit"]:active {
        transform: scale(0.98);
        opacity: 0.9;
      }
      button[type="submit"]:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
        opacity: 0.7;
      }

      .error {
        color: #e53e3e;
        font-size: 13px;
        margin-bottom: 12px;
        display: none;
        text-align: center;
        padding: 10px;
        background: #fef2f2;
        border-radius: 8px;
        border: 1px solid #fecaca;
      }

      .success-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.95);
        z-index: 100;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.3s ease;
      }
      .success-overlay.show {
        display: flex;
      }
      .success-icon {
        width: 64px;
        height: 64px;
        background: #06c755;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .success-icon svg {
        width: 32px;
        height: 32px;
      }
      .success-text {
        font-size: 18px;
        font-weight: 700;
        color: #1a1a1a;
      }
      .success-sub {
        font-size: 14px;
        color: #888;
        margin-top: 6px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes scaleIn {
        from {
          transform: scale(0);
        }
        to {
          transform: scale(1);
        }
      }

      .share-openchat-btn {
        margin-top: 20px;
        padding: 14px 32px;
        background: #06c755;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        animation: fadeIn 0.3s ease 0.5s both;
      }
      .share-openchat-btn:active {
        opacity: 0.9;
      }
      .close-link {
        margin-top: 12px;
        font-size: 14px;
        color: #999;
        cursor: pointer;
        animation: fadeIn 0.3s ease 0.8s both;
      }

      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 0;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e0e0e0;
        border-top-color: #06c755;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loading-text {
        margin-top: 12px;
        font-size: 14px;
        color: #999;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a1a;
          color: #e5e5e5;
        }
        .section {
          background: #2a2a2a;
          box-shadow: none;
        }
        .section-title {
          border-bottom-color: #333;
        }
        input,
        select,
        textarea {
          background: #333;
          border-color: #444;
          color: #e5e5e5;
        }
        input::placeholder,
        textarea::placeholder {
          color: #666;
        }
        input:focus,
        select:focus,
        textarea:focus {
          background: #3a3a3a;
          border-color: #06c755;
        }
        .hint {
          color: #777;
        }
        label {
          color: #ccc;
        }
        .error {
          background: #3a1a1a;
          border-color: #5a2a2a;
        }
        .close-link {
          color: #666;
        }
        .toast {
          background: #e5e5e5;
          color: #1a1a1a;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>開團</h1>
      <p>填寫以下資訊，Bot 會自動在大群發布公告</p>
    </div>

    <form id="form">
      <div class="form-wrapper">
        <!-- Section: 密室資訊 -->
        <div class="section">
          <div class="section-title">密室資訊</div>
          <div class="form-group">
            <label>密室名稱 <span class="required-mark">*</span></label>
            <input
              type="text"
              id="roomName"
              placeholder="例：密室逃脫"
              required
              autocomplete="off"
            />
          </div>
          <div class="form-group">
            <label>工作室 <span class="optional">選填</span></label>
            <input type="text" id="studio" placeholder="例：密室逃脫工作室" autocomplete="off" />
          </div>
          <div class="row">
            <div class="form-group">
              <label>地區</label>
              <select id="location">
                <option value="">不指定</option>
                <optgroup label="北部">
                  <option value="keelung">基隆</option>
                  <option value="taipei">台北</option>
                  <option value="new_taipei">新北</option>
                  <option value="taoyuan">桃園</option>
                  <option value="hsinchu">新竹</option>
                  <option value="miaoli">苗栗</option>
                </optgroup>
                <optgroup label="中部">
                  <option value="taichung">台中</option>
                  <option value="changhua">彰化</option>
                  <option value="nantou">南投</option>
                  <option value="yunlin">雲林</option>
                  <option value="chiayi">嘉義</option>
                </optgroup>
                <optgroup label="南部">
                  <option value="tainan">台南</option>
                  <option value="kaohsiung">高雄</option>
                  <option value="pingtung">屏東</option>
                </optgroup>
                <optgroup label="東部">
                  <option value="yilan">宜蘭</option>
                  <option value="hualien">花蓮</option>
                  <option value="taitung">台東</option>
                </optgroup>
                <optgroup label="離島">
                  <option value="penghu">澎湖</option>
                  <option value="kinmen">金門</option>
                  <option value="matsu">馬祖</option>
                </optgroup>
              </select>
            </div>
            <div class="form-group">
              <label>每人費用</label>
              <div class="input-with-unit">
                <input type="number" id="price" min="0" inputmode="numeric" placeholder="500" />
                <span class="unit">元</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Section: 活動設定 -->
        <div class="section">
          <div class="section-title">活動設定</div>
          <div class="form-group">
            <label>活動時間 <span class="required-mark">*</span></label>
            <input type="datetime-local" id="datetime" required />
          </div>
          <div class="form-group">
            <label>遊戲時長 <span class="required-mark">*</span></label>
            <div class="input-with-unit">
              <input
                type="number"
                id="duration"
                min="1"
                max="300"
                inputmode="numeric"
                value="60"
                required
              />
              <span class="unit">分鐘</span>
            </div>
          </div>
          <div class="row-3">
            <div class="form-group">
              <label>最少成團</label>
              <input
                type="number"
                id="minMembers"
                min="2"
                max="25"
                inputmode="numeric"
                placeholder="4"
              />
            </div>
            <div class="form-group">
              <label>人數上限 <span class="required-mark">*</span></label>
              <input type="number" id="maxMembers" min="2" max="25" inputmode="numeric" value="6" />
            </div>
            <div class="form-group">
              <label>已有人數</label>
              <input
                type="number"
                id="prefilledMembers"
                min="1"
                max="24"
                inputmode="numeric"
                value="1"
              />
              <div class="hint">含你自己</div>
            </div>
          </div>
        </div>

        <!-- Section: 備註 -->
        <div class="section">
          <div class="section-title">備註</div>
          <div class="form-group">
            <textarea
              id="note"
              rows="3"
              placeholder="其他說明（例：需要有經驗的玩家、自備道具等）"
              style="
                width: 100%;
                padding: 10px 12px;
                border: 1.5px solid #e0e0e0;
                border-radius: 8px;
                font-size: 15px;
                background: #fafafa;
                font-family: inherit;
                resize: vertical;
                -webkit-appearance: none;
                transition:
                  border-color 0.2s,
                  box-shadow 0.2s;
              "
              onfocus="
                this.style.borderColor = '#06C755';
                this.style.boxShadow = '0 0 0 3px rgba(6,199,85,0.1)';
                this.style.background = 'white';
              "
              onblur="
                this.style.borderColor = '#e0e0e0';
                this.style.boxShadow = 'none';
                this.style.background = '#fafafa';
              "
            ></textarea>
          </div>
        </div>
      </div>

      <div class="submit-area">
        <div class="error" id="error"></div>
        <button type="submit" id="submitBtn">開團</button>
      </div>
    </form>

    <div class="success-overlay" id="successOverlay">
      <div class="success-icon">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="white"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <div class="success-text">開團成功</div>
      <div class="success-sub">訂閱者已收到通知</div>
      <button
        class="share-openchat-btn"
        id="shareBtn"
        style="display: none"
        onclick="shareToChat()"
      >
        分享到聊天室
      </button>
      <div class="close-link" id="closeLink" style="display: none" onclick="liff.closeWindow()">
        關閉
      </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
      const LIFF_ID = "2009659299-rbF8C1zz";

      async function init() {
        try {
          await liff.init({ liffId: LIFF_ID });
          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }

          // Check if opened for sharing
          const params = new URLSearchParams(window.location.search);
          const shareId = params.get("share");
          if (shareId && liff.isApiAvailable("shareTargetPicker")) {
            await handleAutoShare(shareId);
            return;
          }
          // Set default datetime to next hour
          const now = new Date();
          now.setHours(now.getHours() + 1, 0, 0, 0);
          const y = now.getFullYear();
          const m = String(now.getMonth() + 1).padStart(2, "0");
          const d = String(now.getDate()).padStart(2, "0");
          const h = String(now.getHours()).padStart(2, "0");
          document.getElementById("datetime").value = `${y}-${m}-${d}T${h}:00`;
        } catch (e) {
          showError("LIFF 初始化失敗：" + e.message);
        }
      }

      async function handleAutoShare(shareId) {
        try {
          let messages;
          if (shareId === "all") {
            // Share daily summary
            const res = await fetch("https://escape-group.vercel.app/api/summary-text");
            const data = await res.json();
            messages =
              data.flex && data.flex.length > 0
                ? data.flex.slice(0, 5)
                : [{ type: "text", text: data.text }];
          } else {
            // Share single group card
            const res = await fetch(`https://escape-group.vercel.app/api/groups/${shareId}/card`);
            const data = await res.json();
            messages = data.flexCard ? [data.flexCard] : null;
          }
          if (messages) {
            await liff.shareTargetPicker(messages);
          }
          liff.closeWindow();
        } catch (e) {
          liff.closeWindow();
        }
      }

      function showError(msg) {
        const el = document.getElementById("error");
        el.textContent = msg;
        el.style.display = "block";
      }

      let createdFlexCard = null;

      function showSuccess() {
        document.getElementById("successOverlay").classList.add("show");
        if (createdFlexCard && liff.isApiAvailable("shareTargetPicker")) {
          document.getElementById("shareBtn").style.display = "";
          document.getElementById("closeLink").style.display = "";
        } else {
          setTimeout(() => {
            try {
              liff.closeWindow();
            } catch (_) {}
          }, 1500);
        }
      }

      async function shareToChat() {
        if (!createdFlexCard) return;
        try {
          await liff.shareTargetPicker([createdFlexCard]);
          liff.closeWindow();
        } catch (_) {
          liff.closeWindow();
        }
      }

      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.textContent = "送出中...";
        document.getElementById("error").style.display = "none";

        try {
          const profile = await liff.getProfile();
          const datetime = document.getElementById("datetime").value;

          const payload = {
            lineUserId: profile.userId,
            displayName: profile.displayName,
            roomName: document.getElementById("roomName").value.trim(),
            studio: document.getElementById("studio").value.trim() || undefined,
            location: document.getElementById("location").value || undefined,
            datetime: datetime ? new Date(datetime).toISOString() : undefined,
            minMembers: document.getElementById("minMembers").value
              ? parseInt(document.getElementById("minMembers").value)
              : undefined,
            maxMembers: parseInt(document.getElementById("maxMembers").value),
            prefilledMembers: parseInt(document.getElementById("prefilledMembers").value),
            price: document.getElementById("price").value
              ? parseInt(document.getElementById("price").value)
              : undefined,
            duration: document.getElementById("duration").value
              ? parseInt(document.getElementById("duration").value)
              : undefined,
            note: document.getElementById("note").value.trim() || undefined,
          };

          if (!payload.roomName) {
            showError("請填寫密室名稱");
            btn.disabled = false;
            btn.textContent = "開團";
            return;
          }
          if (!payload.datetime) {
            showError("請選擇活動時間");
            btn.disabled = false;
            btn.textContent = "開團";
            return;
          }
          if (!payload.duration) {
            showError("請填寫遊戲時長");
            btn.disabled = false;
            btn.textContent = "開團";
            return;
          }

          const res = await fetch("https://escape-group.vercel.app/api/groups", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "開團失敗");
          }

          const result = await res.json();
          createdFlexCard = result.flexCard || null;

          showSuccess();
        } catch (err) {
          showError(err.message);
          btn.disabled = false;
          btn.textContent = "開團";
        }
      });

      document.getElementById("maxMembers").addEventListener("change", validateNumbers);
      document.getElementById("minMembers").addEventListener("change", validateNumbers);
      document.getElementById("prefilledMembers").addEventListener("change", validateNumbers);

      function validateNumbers() {
        const min = parseInt(document.getElementById("minMembers").value) || 0;
        const max = parseInt(document.getElementById("maxMembers").value) || 0;
        const pre = parseInt(document.getElementById("prefilledMembers").value) || 0;

        const maxEl = document.getElementById("maxMembers");
        const preEl = document.getElementById("prefilledMembers");

        if (min > 0 && max > 0 && min > max) {
          maxEl.style.borderColor = "#e53e3e";
        } else {
          maxEl.style.borderColor = "";
        }

        if (pre >= max && max > 0) {
          preEl.style.borderColor = "#e53e3e";
        } else {
          preEl.style.borderColor = "";
        }
      }

      init();
    </script>
  </body>
</html>
