<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>訂閱設定</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC", sans-serif;
        background: #f5f6f8;
        color: #1a1a1a;
        min-height: 100vh;
        min-height: 100dvh;
        padding-bottom: env(safe-area-inset-bottom, 0);
        overscroll-behavior: contain;
      }
      .header {
        background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        padding: 24px 20px 20px;
        text-align: center;
        color: white;
      }
      .header h1 {
        font-size: 20px;
        font-weight: 700;
      }
      .header p {
        font-size: 13px;
        opacity: 0.85;
        margin-top: 4px;
      }
      .content {
        padding: 16px;
      }
      .section {
        background: white;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .section-title {
        font-size: 12px;
        font-weight: 600;
        color: #8b5cf6;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #f0f0f0;
      }

      /* Current subscriptions */
      .sub-list {
        min-height: 40px;
      }
      .sub-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #f5f5f5;
        animation: fadeIn 0.2s ease;
      }
      .sub-item:last-child {
        border-bottom: none;
      }
      .sub-info {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        min-width: 0;
      }
      .sub-badge {
        display: inline-flex;
        align-items: center;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: 600;
        white-space: nowrap;
      }
      .badge-location {
        background: #dbeafe;
        color: #1d4ed8;
      }
      .badge-keyword {
        background: #fef3c7;
        color: #92400e;
      }
      .badge-price {
        background: #d1fae5;
        color: #065f46;
      }
      .badge-weekday {
        background: #ede9fe;
        color: #6d28d9;
      }
      .sub-value {
        font-size: 14px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .del-btn {
        background: none;
        border: none;
        color: #ccc;
        font-size: 18px;
        padding: 8px;
        cursor: pointer;
        transition: color 0.2s;
        flex-shrink: 0;
      }
      .del-btn:active {
        color: #e53e3e;
      }
      .empty {
        text-align: center;
        padding: 16px 0;
        color: #bbb;
        font-size: 14px;
      }

      /* Add section */
      .add-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 14px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .add-tabs::-webkit-scrollbar {
        display: none;
      }
      .tab {
        padding: 8px 14px;
        border: 1.5px solid #e0e0e0;
        border-radius: 20px;
        background: white;
        font-size: 13px;
        font-weight: 600;
        color: #888;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .tab.active {
        border-color: #8b5cf6;
        color: #8b5cf6;
        background: #f5f3ff;
      }
      .tab:active {
        transform: scale(0.96);
      }

      .panel {
        display: none;
      }
      .panel.show {
        display: block;
        animation: fadeIn 0.2s ease;
      }

      /* Location grid */
      .region {
        margin-bottom: 12px;
      }
      .region-label {
        font-size: 11px;
        color: #999;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .city-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .city-btn {
        padding: 8px 14px;
        border: 1.5px solid #e0e0e0;
        border-radius: 8px;
        background: white;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .city-btn:active {
        transform: scale(0.95);
      }
      .city-btn.on {
        border-color: #8b5cf6;
        background: #f5f3ff;
        color: #8b5cf6;
        font-weight: 600;
      }

      /* Weekday grid */
      .day-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
      }
      .day-btn {
        padding: 12px 0;
        border: 1.5px solid #e0e0e0;
        border-radius: 8px;
        background: white;
        font-size: 14px;
        text-align: center;
        cursor: pointer;
        transition: all 0.15s;
        font-weight: 500;
      }
      .day-btn:active {
        transform: scale(0.93);
      }
      .day-btn.on {
        border-color: #8b5cf6;
        background: #8b5cf6;
        color: white;
      }
      .day-btn.weekend {
        color: #e53e3e;
      }
      .day-btn.weekend.on {
        background: #8b5cf6;
        color: white;
      }
      .day-hint {
        font-size: 12px;
        color: #999;
        margin-top: 8px;
      }
      .day-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .day-save {
        flex: 1;
        padding: 10px;
        background: #8b5cf6;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .day-save:active {
        opacity: 0.85;
      }
      .day-save:disabled {
        background: #ccc;
      }

      /* Input row */
      .input-row {
        display: flex;
        gap: 8px;
      }
      .input-row input {
        flex: 1;
        padding: 10px 12px;
        border: 1.5px solid #e0e0e0;
        border-radius: 8px;
        font-size: 15px;
        background: #fafafa;
        -webkit-appearance: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .input-row input:focus {
        outline: none;
        border-color: #8b5cf6;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        background: white;
      }
      .input-row input::placeholder {
        color: #c0c0c0;
      }
      .add-btn {
        padding: 10px 16px;
        background: #8b5cf6;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }
      .add-btn:active {
        opacity: 0.85;
      }

      /* Price range */
      .price-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .price-row input {
        flex: 1;
        padding: 10px 12px;
        border: 1.5px solid #e0e0e0;
        border-radius: 8px;
        font-size: 15px;
        background: #fafafa;
        -webkit-appearance: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .price-row input:focus {
        outline: none;
        border-color: #8b5cf6;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        background: white;
      }
      .price-row input::placeholder {
        color: #c0c0c0;
      }
      .price-sep {
        color: #bbb;
        font-size: 16px;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #1a1a1a;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s;
        z-index: 50;
        pointer-events: none;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 0;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e0e0e0;
        border-top-color: #06c755;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loading-text {
        margin-top: 12px;
        font-size: 14px;
        color: #999;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a1a;
          color: #e5e5e5;
        }
        .section {
          background: #2a2a2a;
          box-shadow: none;
        }
        .section-title {
          border-bottom-color: #333;
        }
        input {
          background: #333;
          border-color: #444;
          color: #e5e5e5;
        }
        input::placeholder {
          color: #666;
        }
        input:focus {
          background: #3a3a3a;
          border-color: #8b5cf6;
        }
        .tab {
          background: #333;
          border-color: #444;
          color: #ccc;
        }
        .tab.active {
          background: #2a1a4a;
          border-color: #8b5cf6;
          color: #8b5cf6;
        }
        .sub-item {
          border-bottom-color: #333;
        }
        .del-btn {
          color: #666;
        }
        .empty,
        .loading-text {
          color: #666;
        }
        .city-btn {
          background: #333;
          border-color: #444;
          color: #ccc;
        }
        .city-btn.on {
          background: #1a3a1a;
          border-color: #8b5cf6;
          color: #8b5cf6;
        }
        .day-btn {
          background: #333;
          border-color: #444;
          color: #ccc;
        }
        .day-btn.on {
          background: #8b5cf6;
          border-color: #8b5cf6;
          color: white;
        }
        .price-sep {
          color: #555;
        }
        .toast {
          background: #e5e5e5;
          color: #1a1a1a;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>訂閱設定</h1>
      <p>有符合條件的新團時會自動通知你</p>
    </div>

    <div class="content">
      <div id="loadingState" class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">載入中</div>
      </div>
      <div id="main" style="display: none">
        <!-- Current subscriptions -->
        <div class="section">
          <div class="section-title">我的訂閱</div>
          <div class="sub-list" id="subList"></div>
        </div>

        <!-- Add new -->
        <div class="section">
          <div class="section-title">新增訂閱</div>
          <div class="add-tabs" id="tabs">
            <div class="tab active" data-tab="location">地區</div>
            <div class="tab" data-tab="weekday">星期</div>
            <div class="tab" data-tab="keyword">關鍵字</div>
            <div class="tab" data-tab="price">價格</div>
          </div>

          <!-- Location panel -->
          <div class="panel show" id="panel-location">
            <div id="locationGrid"></div>
          </div>

          <!-- Weekday panel -->
          <div class="panel" id="panel-weekday">
            <div class="day-grid" id="dayGrid"></div>
            <div class="day-hint">選擇你有空的日子，只通知這些天的團</div>
            <div class="day-actions">
              <button class="day-save" id="saveDaysBtn">儲存</button>
            </div>
          </div>

          <!-- Keyword panel -->
          <div class="panel" id="panel-keyword">
            <div class="input-row">
              <input type="text" id="kwInput" placeholder="密室名稱或工作室" />
              <button class="add-btn" id="addKwBtn">新增</button>
            </div>
          </div>

          <!-- Price panel -->
          <div class="panel" id="panel-price">
            <div class="price-row">
              <input type="number" id="priceMin" inputmode="numeric" placeholder="最低" min="0" />
              <span class="price-sep">~</span>
              <input type="number" id="priceMax" inputmode="numeric" placeholder="最高" min="0" />
              <button class="add-btn" id="addPriceBtn">設定</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
      const LIFF_ID = "2009659299-irfLX2Pl";
      const API = "https://escape-group.vercel.app/api";
      const LOCATIONS = {
        北部: {
          keelung: "基隆",
          taipei: "台北",
          new_taipei: "新北",
          taoyuan: "桃園",
          hsinchu: "新竹",
          miaoli: "苗栗",
        },
        中部: {
          taichung: "台中",
          changhua: "彰化",
          nantou: "南投",
          yunlin: "雲林",
          chiayi: "嘉義",
        },
        南部: { tainan: "台南", kaohsiung: "高雄", pingtung: "屏東" },
        "東部+離島": {
          yilan: "宜蘭",
          hualien: "花蓮",
          taitung: "台東",
          penghu: "澎湖",
          kinmen: "金門",
          matsu: "馬祖",
        },
      };
      const DAY_NAMES = ["日", "一", "二", "三", "四", "五", "六"];
      const ALL_LOCATIONS = Object.values(LOCATIONS).reduce((a, r) => ({ ...a, ...r }), {});

      let uid = null,
        dname = null,
        subs = [];

      // --- Init ---
      async function init() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const p = await liff.getProfile();
        uid = p.userId;
        dname = p.displayName;
        await load();
        buildLocationGrid();
        buildDayGrid();
        setupTabs();
        setupActions();
        document.getElementById("loadingState").style.display = "none";
        document.getElementById("main").style.display = "block";
      }

      // --- API ---
      async function load() {
        const r = await fetch(`${API}/subscriptions?userId=${uid}`);
        subs = await r.json();
        renderList();
      }
      async function addSub(type, value) {
        const r = await fetch(`${API}/subscriptions`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ lineUserId: uid, displayName: dname, type, value }),
        });
        if (r.status === 409) {
          toast("已訂閱過");
          return false;
        }
        if (!r.ok) {
          toast("新增失敗");
          return false;
        }
        const sub = await r.json();
        subs.push(sub);
        renderList();
        return true;
      }
      async function delSub(id) {
        await fetch(`${API}/subscriptions/${id}`, { method: "DELETE" });
        subs = subs.filter((s) => s.id !== id);
        renderList();
        updateLocationGrid();
        updateDayGrid();
        toast("已取消訂閱");
      }

      // --- Render subscription list ---
      function renderList() {
        const el = document.getElementById("subList");
        if (subs.length === 0) {
          el.innerHTML = '<div class="empty">還沒有訂閱，在下方新增條件</div>';
          return;
        }
        el.innerHTML = subs
          .map((s) => {
            let badge, val;
            if (s.type === "location") {
              badge = '<span class="sub-badge badge-location">地區</span>';
              val = ALL_LOCATIONS[s.value] || s.value;
            } else if (s.type === "keyword") {
              badge = '<span class="sub-badge badge-keyword">關鍵字</span>';
              val = s.value;
            } else if (s.type === "price") {
              badge = '<span class="sub-badge badge-price">價格</span>';
              const [mn, mx] = s.value.split("-").map(Number);
              if (mn > 0 && mx > 0) val = `${mn}~${mx} 元`;
              else if (mx > 0) val = `${mx} 元以下`;
              else if (mn > 0) val = `${mn} 元以上`;
              else val = s.value;
            } else if (s.type === "weekday") {
              badge = '<span class="sub-badge badge-weekday">星期</span>';
              val =
                "每週" +
                s.value
                  .split(",")
                  .map(Number)
                  .map((d) => DAY_NAMES[d])
                  .join("、");
            } else {
              badge = "";
              val = s.value;
            }
            return `<div class="sub-item" id="sub-${s.id}">
          <div class="sub-info">${badge}<span class="sub-value">${val}</span></div>
          <button class="del-btn" onclick="delSub('${s.id}')">✕</button>
        </div>`;
          })
          .join("");
      }

      // --- Location grid ---
      function buildLocationGrid() {
        const el = document.getElementById("locationGrid");
        let html = "";
        for (const [region, cities] of Object.entries(LOCATIONS)) {
          html += `<div class="region"><div class="region-label">${region}</div><div class="city-grid">`;
          for (const [v, label] of Object.entries(cities)) {
            html += `<div class="city-btn" data-loc="${v}" onclick="toggleLoc('${v}')">${label}</div>`;
          }
          html += "</div></div>";
        }
        el.innerHTML = html;
        updateLocationGrid();
      }
      function updateLocationGrid() {
        const subbed = new Set(subs.filter((s) => s.type === "location").map((s) => s.value));
        document.querySelectorAll(".city-btn").forEach((b) => {
          b.classList.toggle("on", subbed.has(b.dataset.loc));
        });
      }
      async function toggleLoc(v) {
        const existing = subs.find((s) => s.type === "location" && s.value === v);
        if (existing) {
          await delSub(existing.id);
        } else {
          if (await addSub("location", v)) {
            toast("已訂閱 " + (ALL_LOCATIONS[v] || v));
            updateLocationGrid();
          }
        }
      }

      // --- Day grid ---
      let selectedDays = new Set();
      function buildDayGrid() {
        const el = document.getElementById("dayGrid");
        el.innerHTML = DAY_NAMES.map((name, i) => {
          const weekend = i === 0 || i === 6 ? " weekend" : "";
          return `<div class="day-btn${weekend}" data-day="${i}" onclick="toggleDay(${i})">${name}</div>`;
        }).join("");
        updateDayGrid();
      }
      function updateDayGrid() {
        const existing = subs.find((s) => s.type === "weekday");
        selectedDays = existing ? new Set(existing.value.split(",").map(Number)) : new Set();
        document.querySelectorAll(".day-btn").forEach((b) => {
          b.classList.toggle("on", selectedDays.has(Number(b.dataset.day)));
        });
        document.getElementById("saveDaysBtn").disabled = false;
      }
      function toggleDay(d) {
        if (selectedDays.has(d)) selectedDays.delete(d);
        else selectedDays.add(d);
        document.querySelectorAll(".day-btn").forEach((b) => {
          b.classList.toggle("on", selectedDays.has(Number(b.dataset.day)));
        });
      }

      // --- Tabs ---
      function setupTabs() {
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
            document.querySelectorAll(".panel").forEach((p) => p.classList.remove("show"));
            tab.classList.add("active");
            document.getElementById("panel-" + tab.dataset.tab).classList.add("show");
          });
        });
      }

      // --- Action buttons ---
      function setupActions() {
        // Keyword
        document.getElementById("addKwBtn").addEventListener("click", async () => {
          const input = document.getElementById("kwInput");
          const v = input.value.trim();
          if (!v) return;
          if (await addSub("keyword", v)) {
            toast("已訂閱「" + v + "」");
            input.value = "";
          }
        });
        // Price
        document.getElementById("addPriceBtn").addEventListener("click", async () => {
          const mn = document.getElementById("priceMin").value
            ? parseInt(document.getElementById("priceMin").value)
            : 0;
          const mx = document.getElementById("priceMax").value
            ? parseInt(document.getElementById("priceMax").value)
            : 0;
          if (mn === 0 && mx === 0) {
            toast("請至少填一個金額");
            return;
          }
          if (mn > 0 && mx > 0 && mn > mx) {
            toast("最低不能大於最高");
            return;
          }
          // Remove old price sub
          const old = subs.find((s) => s.type === "price");
          if (old) await delSub(old.id);
          if (await addSub("price", `${mn}-${mx}`)) {
            toast("已設定價格範圍");
            document.getElementById("priceMin").value = "";
            document.getElementById("priceMax").value = "";
          }
        });
        // Weekday save
        document.getElementById("saveDaysBtn").addEventListener("click", async () => {
          if (selectedDays.size === 0) {
            toast("請至少選一天");
            return;
          }
          // Remove old weekday sub
          const old = subs.find((s) => s.type === "weekday");
          if (old) {
            await fetch(`${API}/subscriptions/${old.id}`, { method: "DELETE" });
            subs = subs.filter((s) => s.id !== old.id);
          }
          const value = [...selectedDays].sort().join(",");
          if (await addSub("weekday", value)) {
            toast("已設定通知日");
            updateDayGrid();
          }
        });
      }

      function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2000);
      }

      init().catch((e) => {
        document.getElementById("loadingState").textContent = "載入失敗：" + e.message;
      });
    </script>
  </body>
</html>
