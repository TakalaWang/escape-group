<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // LIFF appends path after endpoint URL
      // If opened directly without path, redirect to create-group
      const path = window.location.pathname;
      if (path === "/liff/" || path === "/liff") {
        window.location.replace("/liff/create-group/");
      }
    </script>
  </head>
  <body></body>
</html>
