<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>分享</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC", sans-serif;
        background: #f5f6f8;
        color: #1a1a1a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        max-width: 360px;
        width: 100%;
        text-align: center;
      }
      h1 {
        font-size: 18px;
        margin-bottom: 8px;
      }
      p {
        font-size: 13px;
        color: #888;
        margin-bottom: 20px;
      }
      .share-btn {
        width: 100%;
        padding: 14px;
        background: #06c755;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }
      .share-btn:active {
        opacity: 0.9;
      }
      .share-btn:disabled {
        background: #ccc;
      }
      .status {
        margin-top: 12px;
        font-size: 13px;
        color: #888;
      }
      .status.ok {
        color: #06c755;
      }
      .status.err {
        color: #e53e3e;
      }
      .loading {
        font-size: 14px;
        color: #999;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="loading" class="loading">載入中...</div>
      <div id="main" style="display: none">
        <h1 id="title">分享</h1>
        <p id="desc">選擇聊天室分享開團卡片</p>
        <button class="share-btn" id="shareBtn" onclick="share()">分享到聊天室</button>
        <div class="status" id="status"></div>
      </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
      const LIFF_ID = "2009659299-rbF8C1zz";
      const API = "https://escape-group.vercel.app/api";
      let messages = [];

      async function init() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const groupId = params.get("groupId");

        if (groupId) {
          // Single group share
          const res = await fetch(`${API}/groups/${groupId}/card`);
          const data = await res.json();
          if (data.flexCard) {
            messages = [data.flexCard];
            document.getElementById("title").textContent = "分享開團卡片";
            document.getElementById("desc").textContent = "選擇聊天室分享此團的卡片";
          }
        } else {
          // Daily summary share
          const res = await fetch(`${API}/summary-text`);
          const data = await res.json();
          if (data.flex && data.flex.length > 0) {
            messages = data.flex.slice(0, 5);
            document.getElementById("title").textContent = "分享開團彙整";
            document.getElementById("desc").textContent =
              `${messages.length > 1 ? "多個團的" : ""}開團卡片`;
          } else if (data.text) {
            messages = [{ type: "text", text: data.text }];
            document.getElementById("title").textContent = "分享開團彙整";
            document.getElementById("desc").textContent = "純文字版本";
          }
        }

        if (messages.length === 0) {
          document.getElementById("title").textContent = "沒有可分享的內容";
          document.getElementById("desc").textContent = "目前沒有開放的團";
          document.getElementById("shareBtn").style.display = "none";
        }

        document.getElementById("loading").style.display = "none";
        document.getElementById("main").style.display = "block";
      }

      async function share() {
        if (!liff.isApiAvailable("shareTargetPicker")) {
          setStatus("err", "此環境不支援分享功能");
          return;
        }
        try {
          const result = await liff.shareTargetPicker(messages);
          if (result) {
            setStatus("ok", "已分享！");
            setTimeout(() => liff.closeWindow(), 1000);
          } else {
            setStatus("", "已取消");
          }
        } catch (e) {
          setStatus("err", "分享失敗：" + e.message);
        }
      }

      function setStatus(cls, msg) {
        const el = document.getElementById("status");
        el.className = "status" + (cls ? " " + cls : "");
        el.textContent = msg;
      }

      init().catch((e) => {
        document.getElementById("loading").textContent = "載入失敗：" + e.message;
      });
    </script>
  </body>
</html>
