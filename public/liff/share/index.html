<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>分享彙整</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC", sans-serif;
        background: #f5f6f8;
        color: #1a1a1a;
        min-height: 100vh;
        min-height: 100dvh;
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      .header {
        background: linear-gradient(135deg, #06c755 0%, #05a647 100%);
        padding: 24px 20px 20px;
        text-align: center;
        color: white;
      }
      .header h1 {
        font-size: 20px;
        font-weight: 700;
      }
      .header p {
        font-size: 13px;
        opacity: 0.85;
        margin-top: 4px;
      }
      .content {
        padding: 16px;
      }
      .section {
        background: white;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .group-count {
        font-size: 14px;
        color: #888;
        margin-bottom: 12px;
      }
      .group-item {
        padding: 10px 0;
        border-bottom: 1px solid #f0f0f0;
      }
      .group-item:last-child {
        border-bottom: none;
      }
      .gi-name {
        font-size: 15px;
        font-weight: 600;
      }
      .gi-info {
        font-size: 12px;
        color: #888;
        margin-top: 4px;
      }
      .share-btn {
        width: 100%;
        padding: 16px;
        background: #06c755;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 4px;
      }
      .share-btn:active {
        opacity: 0.9;
      }
      .share-btn:disabled {
        background: #ccc;
      }
      .alt-btn {
        width: 100%;
        padding: 12px;
        background: none;
        border: 1.5px solid #e0e0e0;
        border-radius: 10px;
        font-size: 14px;
        color: #888;
        cursor: pointer;
        margin-top: 8px;
      }
      .status {
        text-align: center;
        margin-top: 12px;
        font-size: 13px;
        color: #888;
      }
      .status.ok {
        color: #06c755;
      }
      .status.err {
        color: #e53e3e;
      }
      .loading {
        text-align: center;
        padding: 40px 0;
        color: #999;
      }
      .empty {
        text-align: center;
        padding: 32px;
        color: #bbb;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>分享開團彙整</h1>
      <p>選擇聊天室分享漂亮的開團卡片</p>
    </div>
    <div class="content">
      <div id="loading" class="loading">載入中...</div>
      <div id="main" style="display: none">
        <div class="section" id="preview"></div>
        <div class="share-area">
          <button class="share-btn" id="shareFlexBtn" disabled>分享卡片到聊天室</button>
          <button class="alt-btn" id="shareTextBtn" disabled>分享純文字版本</button>
        </div>
        <div class="status" id="status"></div>
      </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
      const LIFF_ID = "2009659299-rbF8C1zz";
      const API = "https://escape-group.vercel.app/api";
      const DAYS = ["日", "一", "二", "三", "四", "五", "六"];
      let flexCards = [];
      let textSummary = "";

      async function init() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const res = await fetch(`${API}/summary-text`);
        const data = await res.json();
        textSummary = data.text;
        flexCards = data.flex || [];

        renderPreview(data);

        document.getElementById("shareFlexBtn").disabled = false;
        document.getElementById("shareTextBtn").disabled = false;
        document.getElementById("loading").style.display = "none";
        document.getElementById("main").style.display = "block";

        document.getElementById("shareFlexBtn").addEventListener("click", () => shareFlex());
        document.getElementById("shareTextBtn").addEventListener("click", () => shareText());
      }

      function renderPreview(data) {
        const el = document.getElementById("preview");
        // Parse text to count groups
        const lines = textSummary.split("\n").filter((l) => l.startsWith("▸"));
        if (lines.length === 0) {
          el.innerHTML = '<div class="empty">目前沒有開放的團</div>';
          document.getElementById("shareFlexBtn").style.display = "none";
          document.getElementById("shareTextBtn").style.display = "none";
          return;
        }

        let html = `<div class="group-count">${lines.length} 個團開放中</div>`;
        for (const line of lines) {
          const name = line.replace("▸ ", "").trim();
          html += `<div class="group-item"><div class="gi-name">${name}</div></div>`;
        }
        el.innerHTML = html;
      }

      async function shareFlex() {
        if (!liff.isApiAvailable("shareTargetPicker")) {
          setStatus("err", "此環境不支援分享功能");
          return;
        }
        try {
          // shareTargetPicker accepts up to 5 messages, each flex can have 12 bubbles
          const messages = flexCards.slice(0, 5);
          if (messages.length === 0) {
            shareText();
            return;
          }
          const result = await liff.shareTargetPicker(messages);
          if (result) {
            setStatus("ok", "已分享！");
            setTimeout(() => liff.closeWindow(), 1000);
          } else {
            setStatus("", "已取消");
          }
        } catch (e) {
          setStatus("err", "分享失敗：" + e.message);
        }
      }

      async function shareText() {
        if (!liff.isApiAvailable("shareTargetPicker")) {
          setStatus("err", "此環境不支援分享功能");
          return;
        }
        try {
          const result = await liff.shareTargetPicker([{ type: "text", text: textSummary }]);
          if (result) {
            setStatus("ok", "已分享！");
            setTimeout(() => liff.closeWindow(), 1000);
          } else {
            setStatus("", "已取消");
          }
        } catch (e) {
          setStatus("err", "分享失敗：" + e.message);
        }
      }

      function setStatus(cls, msg) {
        const el = document.getElementById("status");
        el.className = "status" + (cls ? " " + cls : "");
        el.textContent = msg;
      }

      init().catch((e) => {
        document.getElementById("loading").textContent = "載入失敗：" + e.message;
      });
    </script>
  </body>
</html>
