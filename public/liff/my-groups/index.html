<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的團</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC", sans-serif;
        background: #f5f6f8;
        color: #1a1a1a;
        min-height: 100vh;
        min-height: 100dvh;
        padding-bottom: env(safe-area-inset-bottom, 0);
        overscroll-behavior: contain;
      }
      .header {
        background: linear-gradient(135deg, #1e2a4a 0%, #121830 100%);
        padding: 24px 20px 20px;
        text-align: center;
        color: white;
      }
      .header h1 {
        font-size: 20px;
        font-weight: 700;
      }
      .header p {
        font-size: 13px;
        opacity: 0.85;
        margin-top: 4px;
      }
      .content {
        padding: 16px;
      }

      .group-card {
        background: white;
        border-radius: 12px;
        margin-bottom: 12px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        overflow: hidden;
        animation: fadeIn 0.2s ease;
      }
      .gc-header {
        padding: 14px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .gc-name {
        font-size: 16px;
        font-weight: 700;
        flex: 1;
      }
      .gc-badge {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 4px;
        font-weight: 600;
      }
      .badge-open {
        background: #f0fdf4;
        color: #16a34a;
      }
      .badge-full {
        background: #eff6ff;
        color: #2563eb;
      }
      .badge-cancelled {
        background: #fef2f2;
        color: #dc2626;
      }
      .badge-completed {
        background: #f3f4f6;
        color: #6b7280;
      }
      .gc-info {
        padding: 0 16px 12px;
        font-size: 13px;
        color: #888;
      }
      .gc-members {
        padding: 12px 16px;
        background: #fafafa;
        border-top: 1px solid #f0f0f0;
      }
      .gc-members-title {
        font-size: 12px;
        font-weight: 600;
        color: #999;
        margin-bottom: 8px;
      }
      .member-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid #f0f0f0;
      }
      .member-row:last-child {
        border-bottom: none;
      }
      .member-name {
        font-size: 14px;
      }
      .kick-btn {
        background: none;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 11px;
        color: #999;
        cursor: pointer;
      }
      .kick-btn:active {
        border-color: #fca5a5;
        color: #e53e3e;
        background: #fef2f2;
      }
      .gc-actions {
        padding: 12px 16px;
        display: flex;
        gap: 8px;
        border-top: 1px solid #f0f0f0;
      }
      .action-btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .action-btn:active {
        opacity: 0.85;
      }
      .btn-cancel {
        background: #fef2f2;
        color: #dc2626;
      }
      .btn-members {
        background: #f5f3ff;
        color: #8b5cf6;
      }
      .no-members {
        font-size: 13px;
        color: #bbb;
        padding: 8px 0;
      }

      .empty {
        text-align: center;
        padding: 40px 20px;
        color: #bbb;
        font-size: 14px;
        line-height: 1.6;
      }
      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 0;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e0e0e0;
        border-top-color: #06c755;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loading-text {
        margin-top: 12px;
        font-size: 14px;
        color: #999;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #1a1a1a;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s;
        z-index: 50;
        pointer-events: none;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .tabs {
        display: flex;
        background: white;
        border-bottom: 1px solid #eee;
      }
      .tabs .tab {
        flex: 1;
        text-align: center;
        padding: 14px;
        font-size: 14px;
        font-weight: 600;
        color: #999;
        cursor: pointer;
        border-bottom: 2.5px solid transparent;
        transition: all 0.2s;
      }
      .tabs .tab.active {
        color: #1a1a1a;
        border-bottom-color: #1e2a4a;
      }

      .expand-toggle {
        cursor: pointer;
        user-select: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a1a;
          color: #e5e5e5;
        }
        .group-card {
          background: #2a2a2a;
          box-shadow: none;
        }
        .gc-info {
          color: #999;
        }
        .gc-members {
          background: #222;
          border-top-color: #333;
        }
        .member-row {
          border-bottom-color: #333;
        }
        .empty,
        .no-members,
        .loading-text {
          color: #666;
        }
        .tab {
          color: #ccc;
        }
        .tab.active {
          color: #e5e5e5;
        }
        .tabs {
          background: #2a2a2a;
          border-bottom-color: #333;
        }
        .toast {
          background: #e5e5e5;
          color: #1a1a1a;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>我的團</h1>
      <p>管理你開的團與加入的團</p>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="hosted" onclick="switchTab('hosted')">我開的團</div>
      <div class="tab" data-tab="joined" onclick="switchTab('joined')">我加入的團</div>
    </div>
    <div class="content">
      <div id="loadingState" class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">載入中</div>
      </div>
      <div id="main" style="display: none"></div>
    </div>
    <div class="toast" id="toast"></div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
      const LIFF_ID = "2009659299-QVE0QjlG";
      const API = "https://escape-group.vercel.app/api";
      const DAYS = ["日", "一", "二", "三", "四", "五", "六"];
      const STATUS = {
        open: ["募集中", "badge-open"],
        full: ["已額滿", "badge-full"],
        cancelled: ["已取消", "badge-cancelled"],
        completed: ["已完成", "badge-completed"],
      };
      let uid = null;
      let expandedGroups = new Set();
      let currentTab = "hosted";

      async function init() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        uid = (await liff.getProfile()).userId;
        document.getElementById("loadingState").style.display = "none";
        document.getElementById("main").style.display = "block";
        await loadGroups();
      }

      async function loadGroups() {
        const res = await fetch(`${API}/my-groups?userId=${uid}`);
        const groups = await res.json();
        renderGroups(groups);
      }

      function fmtDate(d) {
        if (!d) return "時間未定";
        const dt = new Date(d);
        return `${dt.getMonth() + 1}/${dt.getDate()}(${DAYS[dt.getDay()]}) ${dt.getHours().toString().padStart(2, "0")}:${dt.getMinutes().toString().padStart(2, "0")}`;
      }

      async function renderGroups(groups) {
        const el = document.getElementById("main");
        if (groups.length === 0) {
          el.innerHTML =
            '<div class="empty">你還沒有開過團<br>點選「開團」來建立第一個團吧！</div>';
          return;
        }

        let html = "";
        for (const g of groups) {
          const [statusLabel, badgeClass] = STATUS[g.status] || STATUS.open;
          const remaining = g.maxMembers - g.currentMembers;
          const isActive = g.status === "open" || g.status === "full";
          const isExpanded = expandedGroups.has(g.id);

          html += `<div class="group-card">
          <div class="gc-header">
            <div class="gc-name">${g.roomName}</div>
            <span class="gc-badge ${badgeClass}">${statusLabel}</span>
          </div>
          <div class="gc-info">
            ${fmtDate(g.datetime)} · ${g.currentMembers}/${g.maxMembers} 人${g.status === "open" ? ` · 還差 ${remaining} 人` : ""}
          </div>`;

          if (isActive) {
            html += `<div class="gc-members" id="members-${g.id}" style="display:${isExpanded ? "block" : "none"}">
            <div class="gc-members-title">成員列表</div>
            <div id="member-list-${g.id}"><div class="no-members">載入中...</div></div>
          </div>
          <div class="gc-actions">
            <button class="action-btn btn-members" onclick="toggleMembers('${g.id}')">
              ${isExpanded ? "收起成員" : "管理成員"}
            </button>
            ${g.status === "open" || g.status === "full" ? `<button class="action-btn btn-cancel" onclick="cancelGroup('${g.id}')">取消團</button>` : ""}
          </div>`;
          }
          html += "</div>";
        }
        el.innerHTML = html;

        // Load members for expanded groups
        for (const gid of expandedGroups) {
          loadMembers(gid);
        }
      }

      async function toggleMembers(gid) {
        const el = document.getElementById("members-" + gid);
        if (!el) return;
        if (expandedGroups.has(gid)) {
          expandedGroups.delete(gid);
          el.style.display = "none";
        } else {
          expandedGroups.add(gid);
          el.style.display = "block";
          await loadMembers(gid);
        }
        // Update button text
        await loadGroups();
      }

      async function loadMembers(gid) {
        const el = document.getElementById("member-list-" + gid);
        if (!el) return;
        const res = await fetch(`${API}/groups/${gid}/members`);
        const members = await res.json();
        if (members.length === 0) {
          el.innerHTML = '<div class="no-members">目前沒有成員加入</div>';
          return;
        }
        el.innerHTML = members
          .map(
            (m) =>
              `<div class="member-row">
          <span class="member-name">${m.displayName}</span>
          <button class="kick-btn" onclick="kickMember('${gid}','${m.id}',this)">移除</button>
        </div>`
          )
          .join("");
      }

      async function cancelGroup(gid) {
        if (!confirm("確定要取消這個團嗎？")) return;
        await fetch(`${API}/groups/${gid}/cancel`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ lineUserId: uid }),
        });
        toast("已取消");
        await loadGroups();
      }

      async function kickMember(gid, memberId, btn) {
        btn.disabled = true;
        await fetch(`${API}/groups/${gid}/kick`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ lineUserId: uid, memberId }),
        });
        toast("已移除");
        await loadMembers(gid);
        await loadGroups();
      }

      function switchTab(tab) {
        currentTab = tab;
        document
          .querySelectorAll(".tabs .tab")
          .forEach((t) => t.classList.toggle("active", t.dataset.tab === tab));
        if (tab === "hosted") loadGroups();
        else loadJoinedGroups();
      }

      async function loadJoinedGroups() {
        const res = await fetch(`${API}/my-joined-groups?userId=${uid}`);
        const groups = await res.json();
        renderJoinedGroups(groups);
      }

      function renderJoinedGroups(groups) {
        const el = document.getElementById("main");
        if (groups.length === 0) {
          el.innerHTML =
            '<div class="empty">你還沒有加入任何團<br>到「找團」看看有什麼團可以加入！</div>';
          return;
        }
        el.innerHTML = groups
          .map((g) => {
            const [statusLabel, badgeClass] = STATUS[g.status] || STATUS.open;
            return `<div class="group-card">
            <div class="gc-header">
              <div class="gc-name">${g.roomName}</div>
              <span class="gc-badge ${badgeClass}">${statusLabel}</span>
            </div>
            <div class="gc-info">
              ${fmtDate(g.datetime)} · ${g.currentMembers}/${g.maxMembers} 人 · 團主：${g.hostName}
            </div>
            ${
              g.status === "open" || g.status === "full"
                ? `<div class="gc-actions">
                <button class="action-btn btn-cancel" onclick="leaveGroup('${g.id}')">退團</button>
              </div>`
                : ""
            }
          </div>`;
          })
          .join("");
      }

      async function leaveGroup(gid) {
        if (!confirm("確定要退出這個團嗎？")) return;
        await fetch(`${API}/groups/${gid}/leave`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ lineUserId: uid }),
        });
        toast("已申請退團");
        loadJoinedGroups();
      }

      function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2000);
      }

      init().catch((e) => {
        document.getElementById("loadingState").textContent = "載入失敗：" + e.message;
      });
    </script>
  </body>
</html>
